<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>decks.makeacompany.ai</title>
<meta name="description" content="MaC decks. Generated from Slack threads via /deck.">
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0a;color:#f5f5f5;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:grid;place-items:center;padding:40px;line-height:1.5}
.wrap{max-width:560px;text-align:center}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#e5e5e5;margin-bottom:24px}
h1{font-size:clamp(28px,5vw,40px);font-weight:600;letter-spacing:-.02em;margin-bottom:16px}
p{color:#888;font-size:16px;margin-bottom:24px}
code{font-family:'JetBrains Mono',ui-monospace,monospace;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:4px;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="dot"></div>
  <h1>MaC decks</h1>
  <p>Decks generated from Slack threads. Type <code>/deck pitch</code> or <code>/deck doc</code> in any MaC-connected thread.</p>
  <p>Each deck lives at its own URL. There's no index.</p>
</div>
</body>
</html>
