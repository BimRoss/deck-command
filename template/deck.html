<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<meta name="description" content="{{SEO_DESCRIPTION}}">
<meta name="keywords" content="{{KEYWORDS}}">
<meta name="author" content="{{AUTHOR}}">
<meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1">
<link rel="canonical" href="https://decks.makeacompany.ai/{{SLUG}}/">
<meta property="og:site_name" content="Make a Company">
<meta property="og:locale" content="en_US">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{SEO_DESCRIPTION}}">
<meta property="og:type" content="article">
<meta property="og:url" content="https://decks.makeacompany.ai/{{SLUG}}/">
<meta property="og:image" content="{{OG_IMAGE}}">
<meta property="article:published_time" content="{{DATE}}T00:00:00Z">
<meta property="article:author" content="{{AUTHOR}}">
<meta property="article:section" content="{{SECTION}}">
<meta property="article:tag" content="{{KEYWORDS}}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{TITLE}}">
<meta name="twitter:description" content="{{SEO_DESCRIPTION}}">
<meta name="twitter:image" content="{{OG_IMAGE}}">
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{TITLE_JSON}}",
  "description": "{{SEO_DESCRIPTION_JSON}}",
  "image": "{{OG_IMAGE}}",
  "datePublished": "{{DATE}}T00:00:00Z",
  "dateModified": "{{DATE}}T00:00:00Z",
  "author": {
    "@type": "Organization",
    "name": "{{AUTHOR_JSON}}",
    "url": "https://makeacompany.ai/"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Make a Company",
    "url": "https://makeacompany.ai/",
    "logo": {
      "@type": "ImageObject",
      "url": "https://makeacompany.ai/og.png"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://decks.makeacompany.ai/{{SLUG}}/"
  },
  "keywords": "{{KEYWORDS_JSON}}"
}
</script>
<style>
:root{
  --bg:#0a0a0a;
  --panel:#111;
  --line:rgba(255,255,255,.08);
  --ink:#f5f5f5;
  --dim:#888;
  --accent:#e5e5e5;
  --link:#9ab8ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-feature-settings:'ss01','cv11';-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{min-height:100vh;padding:64px 24px 96px;line-height:1.5}
.wrap{max-width:980px;margin:0 auto}
.meta{display:flex;justify-content:space-between;align-items:center;color:var(--dim);font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-family:'JetBrains Mono',ui-monospace,monospace;margin-bottom:48px}
.meta .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#e5e5e5;margin-right:8px;vertical-align:middle}
.meta a{color:var(--dim);text-decoration:none}
.meta a:hover{color:var(--ink)}
header{margin-bottom:48px}
h1{font-size:clamp(40px,7vw,72px);font-weight:600;letter-spacing:-.03em;line-height:1.05;margin-bottom:20px}
header .sub{color:var(--dim);font-size:clamp(16px,2vw,18px);max-width:640px}
.byline{margin-top:24px;color:var(--dim);font-size:14px;font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:.02em}
.byline a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
.byline a:hover{border-color:var(--accent)}
.lede{margin:32px 0 64px;color:var(--ink);font-size:clamp(18px,2.2vw,21px);line-height:1.55;max-width:720px}
.lede p{margin-bottom:18px}
.lede p:last-child{margin-bottom:0}
.lede a{color:var(--link);text-decoration:none;border-bottom:1px solid rgba(154,184,255,.3)}
.lede a:hover{border-color:var(--link)}
.lede em{color:var(--dim);font-style:italic}
.slide{border-top:1px solid var(--line);padding:48px 0;display:grid;grid-template-columns:80px 1fr;gap:24px}
.slide .num{color:var(--dim);font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;letter-spacing:.08em;padding-top:8px}
.slide h2{font-size:clamp(24px,3.5vw,32px);font-weight:600;letter-spacing:-.02em;margin-bottom:24px;line-height:1.15}
.slide ul{list-style:none;margin:0;padding:0}
.slide li{position:relative;padding-left:24px;margin-bottom:14px;font-size:17px;color:var(--ink);max-width:720px}
.slide li::before{content:"";position:absolute;left:0;top:11px;width:8px;height:1px;background:var(--accent)}
.slide blockquote{border-left:2px solid var(--accent);padding:8px 0 8px 20px;margin-top:24px;color:var(--dim);font-style:italic;font-size:15px;max-width:680px}
.slide blockquote cite{display:block;margin-top:6px;color:var(--dim);font-style:normal;font-size:12px;letter-spacing:.04em;font-family:'JetBrains Mono',ui-monospace,monospace}
.outro{border-top:1px solid var(--line);padding:64px 0 0;margin-top:8px}
.outro h2{font-size:clamp(22px,3vw,28px);font-weight:600;letter-spacing:-.02em;margin-bottom:20px;line-height:1.2}
.outro p{color:var(--ink);font-size:17px;line-height:1.6;margin-bottom:18px;max-width:720px}
.outro p:last-child{margin-bottom:0}
.outro a{color:var(--link);text-decoration:none;border-bottom:1px solid rgba(154,184,255,.3)}
.outro a:hover{border-color:var(--link)}
.cta{display:inline-block;margin-top:24px;padding:14px 24px;background:var(--ink);color:#0a0a0a;text-decoration:none;font-weight:600;font-size:15px;letter-spacing:-.01em;border-radius:6px;transition:opacity .15s}
.cta:hover{opacity:.85}
footer.site{margin-top:80px;padding-top:32px;border-top:1px solid var(--line);color:var(--dim);font-size:13px;font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:.02em;display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px}
footer.site a{color:var(--dim);text-decoration:none}
footer.site a:hover{color:var(--ink)}
@media (max-width:640px){
  body{padding:40px 20px 64px}
  .slide{grid-template-columns:1fr;gap:8px}
  .slide .num{padding-top:0}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="meta">
    <span><span class="dot"></span>{{SECTION}}</span>
    <span><a href="https://makeacompany.ai/">makeacompany.ai</a> · <time datetime="{{DATE}}">{{DATE}}</time></span>
  </div>
  <article>
  <header>
    <h1>{{TITLE}}</h1>
    <p class="sub">{{SUBTITLE}}</p>
    {{BYLINE_BLOCK}}
  </header>
  {{LEDE_BLOCK}}
  <main>
    {{SLIDES}}
  </main>
  {{OUTRO_BLOCK}}
  </article>
  <footer class="site">
    <span>Published by <a href="https://makeacompany.ai/">Make a Company</a></span>
    <span><a href="https://decks.makeacompany.ai/">More from decks.makeacompany.ai</a></span>
  </footer>
</div>
</body>
</html>
